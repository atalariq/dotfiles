# ============================================
# Intial Setup
# ============================================
exec-once=systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=mango

# Monitor & Screen scaling
# exec=echo "Xft.dpi: 175" | xrdb -merge
# exec=gsettings set org.gnome.desktop.interface text-scaling-factor 1.0
monitorrule=name:eDP-1,width:2560,height:1600,refresh:60,x:0,y:0,scale:1.5,vrr:0,rr:0
# monitorrule=name:HDMI-A-2,width:1920,height:1080,refresh:60,x:0,y:1600,scale:1,vrr:0,rr:0

# # XWayland
# env=DISPLAY,:2
# exec=xwayland-satellite :2

source = ~/.config/mango/autostart.conf

# ============================================
# Input
# ============================================

# keyboard
repeat_rate=30
repeat_delay=350
numlockon=0
xkb_rules_layout=us
xkb_rules_options=ctrl:swap_rwin_rctl

# Trackpad
click_method=2
disable_trackpad=0
disable_while_typing=0
drag_lock=1
left_handed=0
middle_button_emulation=1
scroll_method=1
swipe_min_threshold=1
tap_and_drag=1
tap_to_click=1
trackpad_natural_scrolling=1

# mouse
mouse_accel_profile=1
mouse_accel_speed=0.0
button_map=0
mouse_natural_scrolling=0
send_events_mode=0

# ============================================
# Appearance
# ============================================
gappih=2
gappiv=2
gappoh=4
gappov=4
borderpx=1

# ============================================
# Window effect
# ============================================
blur=0
blur_layer=0
blur_optimized=1
blur_params_num_passes = 2
blur_params_radius = 4
blur_params_noise = 0.02
blur_params_brightness = 0.9
blur_params_contrast = 0.9
blur_params_saturation = 1.2

shadows = 0
layer_shadows = 0
shadow_only_floating = 0
shadows_size = 10
shadows_blur = 15
shadows_position_x = 0
shadows_position_y = 0

border_radius=16
no_radius_when_single=1
focused_opacity=1.0
unfocused_opacity=1.0

# ============================================
# Animation
# ============================================
# support type:zoom,slide
# tag_animation_direction: 1-horizontal,0-vertical
animations=1
layer_animations=1

tag_animation_direction=1

animation_type_open=zoom
animation_type_close=slide
layer_animation_type_open=slide
layer_animation_type_close=slide

zoom_initial_ratio=0.4
zoom_end_ratio=0.8

animation_fade_in=1
animation_fade_out=1
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.5

animation_duration_move=250
animation_duration_open=250
animation_duration_tag=250
animation_duration_close=250
animation_duration_focus=250

animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1

# ============================================
# Layouts
# ============================================
# See also ./tags.conf
circle_layout=tile,monocle

# Scroller Layout Setting
scroller_focus_center=0
scroller_prefer_center=0
scroller_prefer_overspread=1
edge_scroller_pointer_focus=0
scroller_structs=8

scroller_default_proportion=1.0
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

# Master-Stack Layout Setting
new_is_master=0
default_mfact=0.65
default_nmaster=1.0
smartgaps=0
center_when_single_stack=1

# Dwindle
dwindle_split_ratio=0.5
dwindle_smart_split=0
dwindle_hsplit=1
dwindle_vsplit=1
dwindle_preserve_split=0
dwindle_smart_resize=0
dwindle_drop_simple_split=1

# Overview Setting
enable_hotarea=0
hotarea_size=10
hotarea_corner=2
ov_tab_mode=1
overviewgappi=12
overviewgappo=20

# ============================================
# Misc
# ============================================
xwayland_persistence=1

cursor_size=24
no_border_when_single=0
axis_bind_apply_timeout=200
cursor_hide_timeout=0

focus_on_activate=1
idleinhibit_ignore_visible=0

sloppyfocus=1
warpcursor=0

axis_scroll_factor=1.0
view_current_to_back=0

enable_floating_snap=1
snap_distance=20

drag_tile_to_tile=1
drag_corner=4
drag_warp_cursor=1
drag_tile_refresh_interval=10.0
drag_floating_refresh_interval=10.0

focus_cross_monitor=0
focus_cross_tag=0
exchange_cross_monitor=0
scratchpad_cross_monitor=1
single_scratchpad=1

# # ============================================
# # Troubleshooting
# # ============================================
# # My game are lagging/stuttering
# syncobj_enable=1
#
# # My game have high input latency
# allow_tearing=1

# ============================================
# Source
# ============================================

source = ~/.config/mango/tags.conf
source = ~/.config/mango/rules.conf
source = ~/.config/mango/scratchpad.conf
source = ~/.config/mango/binds.conf

# ------------------------------------------------------------------------------

# This sources the noctalia theme

source-optional=/home/atalariq/.config/mango/noctalia.conf

source=~/.config/mango/noctalia.conf
