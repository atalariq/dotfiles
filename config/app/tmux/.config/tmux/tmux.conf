# ~/.config/tmux/tmux.conf — plugin-free, server-first multiplexer

# --- Prefix ---
set -g prefix C-b
bind C-b send-prefix

# --- Terminal / colors ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc,xterm-kitty:Tc"
set -g focus-events on
set -s escape-time 0
set -g history-limit 50000

# --- Indexing ---
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- Mouse + clipboard (OSC52 over SSH/TTY; wl-copy on Wayland desktop) ---
set -g mouse on
set -g set-clipboard on

# --- Copy mode (vi) ---
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy 2>/dev/null || cat >/dev/null"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "wl-copy 2>/dev/null || cat >/dev/null"

# --- Panes / windows (vim-style) ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind z resize-pane -Z

# --- Reload ---
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

# --- wana theme (wana-current.conf is a symlink managed by theme-switch) ---
if-shell "test -e ~/.config/tmux/themes/wana-current.conf" "source-file ~/.config/tmux/themes/wana-current.conf"
