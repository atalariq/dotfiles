# ~/.config/kitty/kitty.conf
#
# Full reference: /usr/share/doc/kitty/kitty.conf

# --- Font ----------------------------------------------------------
font_size 12.0
disable_ligatures           cursor

font_family                 Fira Code
bold_font                   auto
italic_font                 auto
bold_italic_font            auto
font_features               FiraCode-Regular  +ss01 +ss02 +ss03 +ss05 +ss08

# Nerd Font symbols — https://erwin.co/kitty-and-nerd-fonts/
symbol_map  U+E000-U+E00D Symbols Nerd Font Mono
symbol_map U+e0a0-U+e0a2,U+e0b0-U+e0b3 Symbols Nerd Font Mono
symbol_map U+e0a3-U+e0a3,U+e0b4-U+e0c8,U+e0cc-U+e0d2,U+e0d4-U+e0d4 Symbols Nerd Font Mono
symbol_map U+e5fa-U+e62b Symbols Nerd Font Mono
symbol_map U+e700-U+e7c5 Symbols Nerd Font Mono
symbol_map U+f000-U+f2e0 Symbols Nerd Font Mono
symbol_map U+e200-U+e2a9 Symbols Nerd Font Mono
symbol_map U+f400-U+f4a8,U+2665-U+2665,U+26A1-U+26A1,U+f27c-U+f27c Symbols Nerd Font Mono
symbol_map U+F300-U+F313 Symbols Nerd Font Mono
symbol_map U+23fb-U+23fe,U+2b58-U+2b58 Symbols Nerd Font Mono
symbol_map U+f500-U+fd46 Symbols Nerd Font Mono
symbol_map U+e300-U+e3eb Symbols Nerd Font Mono
symbol_map U+21B5,U+25B8,U+2605,U+2630,U+2632,U+2714,U+E0A3,U+E615,U+E62B Symbols Nerd Font Mono

# --- Window --------------------------------------------------------
window_padding_width 4
background_opacity 1.0
background_blur 0
hide_window_decorations yes
placement_strategy center
confirm_os_window_close 0

# --- Layout --------------------------------------------------------

enabled_layouts tall:bias=70;full_size=1;mirrored=false,fat:bias=70;full_size=1;mirrored=false,stack

# --- Cursor --------------------------------------------------------
cursor_shape                 block
cursor_stop_blinking_after   5.0

# --- Tab Bar -------------------------------------------------------
tab_bar_edge bottom
tab_bar_style powerline
tab_bar_align center
tab_bar_min_tabs 2
tab_powerline_style slanted

active_tab_font_style   bold
inactive_tab_font_style normal
tab_title_template      "{index}: {title}"
active_tab_title_template "{index}: {title}{' :' if num_windows > 1 else ''}{num_windows}"

# --- Scrollback ----------------------------------------------------
scrollback_lines 10000
wheel_scroll_multiplier 3.0
touch_scroll_multiplier 3.0

# --- Shell Integration ---------------------------------------------
shell_integration enabled

# --- Clipboard -----------------------------------------------------
clipboard_control write-clipboard write-primary read-clipboard read-primary

# --- Remote Control ------------------------------------------------
allow_remote_control yes

# --- Key Bindings --------------------------------------------------
kitty_mod ctrl+shift
clear_all_shortcuts yes

# Font size
map kitty_mod+equal        change_font_size all +1.0
map kitty_mod+minus        change_font_size all -1.0
map kitty_mod+backspace    change_font_size all 0

# Tab navigation
map kitty_mod+]  next_tab
map kitty_mod+[  previous_tab
map kitty_mod+.  move_tab_forward
map kitty_mod+,  move_tab_backward
map kitty_mod+t  new_tab_with_cwd
map kitty_mod+1  goto_tab 1
map kitty_mod+2  goto_tab 2
map kitty_mod+3  goto_tab 3
map kitty_mod+4  goto_tab 4
map kitty_mod+5  goto_tab 5
map kitty_mod+6  goto_tab 6
map kitty_mod+7  goto_tab 7
map kitty_mod+8  goto_tab 8

# Window management
map kitty_mod+enter  launch --cwd=current
map kitty_mod+n      new_os_window_with_cwd
map kitty_mod+w      close_window
map kitty_mod+space  next_layout
map alt+shift+space  toggle_layout stack
map kitty_mod+f      move_window_forward

map kitty_mod+left  resize_window narrower
map kitty_mod+right resize_window wider
map kitty_mod+up    resize_window taller
map kitty_mod+down  resize_window shorter 3
map kitty_mod+0     resize_window reset

# VIM-style window navigation
map kitty_mod+h  neighboring_window left
map kitty_mod+j  neighboring_window down
map kitty_mod+k  neighboring_window up
map kitty_mod+l  neighboring_window right

map alt+shift+h  move_window left
map alt+shift+j  move_window down
map alt+shift+k  move_window up
map alt+shift+l  move_window right

# Clipboard
map kitty_mod+c  copy_to_clipboard
map kitty_mod+v  paste_from_clipboard

# Kittens
map alt+shift+semicolon  kitten hints
map alt+shift+t  launch --type=overlay kitten themes
map alt+shift+f  launch --type=overlay kitten choose_files
map alt+shift+u  launch --type=overlay kitten unicode_input
map alt+shift+d  launch --type=overlay kitten diff

# Sessions
map ctrl+f12 goto_session    -1
map f12      save_as_session --match=session:.

# Command palette & detach
map kitty_mod+p      command_palette
map kitty_mod+o      open_url_with_hints
map ctrl+f2          open_url_with_hints
map ctrl+f3          detach_window ask
map ctrl+f4          detach_tab    ask

# Misc.
map ctrl+f1     show_kitty_doc overview
map ctrl+f10    toggle_maximized
map ctrl+f11    toggle_fullscreen
map alt+shift+r load_config_file
# map shift+enter send_text all \x1b\r

# BEGIN_KITTY_THEME
# Noctalia
include current-theme.conf
# END_KITTY_THEME

include themes/everforest.conf
