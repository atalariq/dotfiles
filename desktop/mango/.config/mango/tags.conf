# https://mangowm.github.io/docs/window-management/rules#tag-rules
# supported layout_name:
# tile scroller monocle grid deck center_tile vertical_tile right_tile vertical_scroller vertical_grid vertical_deck dwindle fair vertical_fair
tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:vertical_scroller
tagrule=id:3,layout_name:vertical_scroller
tagrule=id:4,layout_name:monocle
tagrule=id:5,layout_name:monocle
tagrule=id:6,layout_name:monocle
tagrule=id:7,layout_name:monocle
tagrule=id:8,layout_name:monocle
tagrule=id:9,layout_name:monocle

tagrule=id:1,monitor_name:HDMI-A-1,layout_name:monocle,no_render_border:1
tagrule=id:1,monitor_name:HDMI-A-2,layout_name:monocle,no_render_border:1

# Terminal
windowrule=tags:1,appid:kitty

# Browser
windowrule=tags:2,appid:brave-browser
windowrule=tags:2,appid:brave-browser

# Productivity & Office
windowrule=tags:3,appid:libreoffice-writer
windowrule=tags:3,appid:libreoffice-calc
windowrule=tags:3,appid:libreoffice-impress
windowrule=tags:3,appid:libreoffice-draw

# Chat Apps
windowrule=tags:4,appid:discord
windowrule=tags:4,appid:vesktop
windowrule=tags:4,appid:WebCord
windowrule=tags:4,appid:org.telegram.desktop
windowrule=tags:4,appid:signal-desktop


