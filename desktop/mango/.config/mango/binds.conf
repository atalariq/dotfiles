# ============================================
# Key Bindings
# ============================================
# key name refer to `xev` or `wev` command output,
# mod keys name: super,ctrl,alt,shift,none

# reload config
# bind=SUPER+SHIFT,R,reload_config
bind=SUPER+SHIFT,R,spawn_shell,mmsg -d reload_config && fyi Reloaded

# menu and terminal
# bind=SUPER,Space,spawn,rofi -show drun
bind=SUPER,Return,spawn_on_empty,kitty,1
bind=SUPER+SHIFT,Return,spawn,kitty
bind=SUPER,W,spawn_on_empty,brave,2

# exit
bind=SUPER+SHIFT+ALT,q,quit
bind=SUPER,q,killclient

# switch window focus
# bind=SUPER,Tab,focusstack,next
# bind=SUPER+SHIFT,Tab,focusstack,prev
bind=SUPER,Tab,focuslast

# switch window focus
bind=SUPER,Left,focusdir,left
bind=SUPER,Right,focusdir,right
bind=SUPER,Up,focusdir,up
bind=SUPER,Down,focusdir,down
bind=SUPER,h,focusdir,left
bind=SUPER,l,focusdir,right
bind=SUPER,k,focusdir,up
bind=SUPER,j,focusdir,down

# swap window
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right
bind=SUPER+SHIFT,k,exchange_client,up
bind=SUPER+SHIFT,j,exchange_client,down
bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,l,exchange_client,right

# switch window status
# bind=SUPER,backslash,togglefloating
bind=SUPER+SHIFT,Space,togglefloating
bind=SUPER,g,toggleglobal
bind=SUPER,o,toggleoverlay

bind=SUPER+SHIFT,f,togglefakefullscreen
bind=SUPER,f,togglefullscreen
bind=SUPER,m,togglemaximizescreen

bind=SUPER,i,minimized
bind=SUPER+SHIFT,i,restore_minimized

# Center a floating window (very handy after movewin)
bind=SUPER+SHIFT,C,centerwin

# gaps
bind=SUPER+SHIFT,X,incgaps,1
bind=SUPER+SHIFT,Z,incgaps,-1
bind=SUPER+SHIFT,G,togglegaps

# ----------------------------
# Layout
# ----------------------------
bind=SUPER+ALT,Space,switch_layout

# Instead of only cycling, allow jumping to specific layouts
bind=SUPER+ALT,t,setlayout,tile
bind=SUPER+ALT,s,setlayout,scroller
bind=SUPER+ALT,m,setlayout,monocle

# scroller layout
bind=SUPER,e,set_proportion,1.0
bind=SUPER,x,switch_proportion_preset

# Master area size control (for tile layout)
bind=SUPER,Z,zoom
bind=SUPER+CTRL,h,setmfact,-0.05
bind=SUPER+CTRL,l,setmfact,+0.05
bind=SUPER+CTRL,j,incnmaster,-1
bind=SUPER+CTRL,k,incnmaster,+1

# ----------------------------
# Tag
# ----------------------------
# tag switch
bind=SUPER+CTRL,bracketleft,viewtoleft_have_client,0
bind=SUPER+CTRL,bracketright,viewtoright_have_client,0
bind=SUPER,bracketleft,viewtoleft,0
bind=SUPER,bracketright,viewtoright,0
bind=SUPER+SHIFT,bracketleft,tagtoleft,0
bind=SUPER+SHIFT,bracketright,tagtoright,0

bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# tag: move client to the tag and focus it
bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0

# tagsilent: move client to the tag and not focus it
bind=SUPER+ALT,1,tagsilent,1,0
bind=SUPER+ALT,2,tagsilent,2,0
bind=SUPER+ALT,3,tagsilent,3,0
bind=SUPER+ALT,4,tagsilent,4,0
bind=SUPER+ALT,5,tagsilent,5,0
bind=SUPER+ALT,6,tagsilent,6,0
bind=SUPER+ALT,7,tagsilent,7,0
bind=SUPER+ALT,8,tagsilent,8,0
bind=SUPER+ALT,9,tagsilent,9,0

# ----------------------------
# Monitor
# ----------------------------
# monitor switch
bind=SUPER+ALT,comma,focusmon,left
bind=SUPER+ALT,period,focusmon,right
bind=SUPER+CTRL+SHIFT,comma,tagmon,left,0
bind=SUPER+CTRL+SHIFT,period,tagmon,right,0

# Toggle external monitor (useful for laptop)
bind=SUPER+SHIFT,m,toggle_monitor,HDMI-A-1

# ---------------------
# Function key
# ---------------------
# screenshot
bind=NONE,XF86LaunchA,spawn_shell,~/.config/mango/script/shot area
bind=CTRL,XF86LaunchA,spawn_shell,~/.config/mango/script/shot screen
bind=ALT,XF86LaunchA,spawn_shell,~/.config/mango/script/shot active
bind=ALT+SHIFT,XF86LaunchA,spawn_shell,~/.config/mango/script/shot record toggle
bind=SUPER,XF86LaunchA,spawn_shell,~/.config/mango/script/shot annotate
bind=SUPER+SHIFT,XF86LaunchA,spawn_shell,~/.config/mango/script/shot ocr

# Control media
bind=NONE,XF86AudioPrev,spawn,playerctl previous
bind=NONE,XF86AudioPlay,spawn,playerctl play-pause
bind=NONE,XF86AudioNext,spawn,playerctl next

# control keyboard light
bind=NONE,XF86KbdBrightnessDown,spawn,kbdlight down
bind=NONE,XF86KbdBrightnessUp,spawn,kbdlight up

# ---------------------
# Noctalia Stuff
# ---------------------
bind=NONE,XF86AudioRaiseVolume,spawn,qs -c noctalia-shell ipc call volume increase
bind=NONE,XF86AudioLowerVolume,spawn,qs -c noctalia-shell ipc call volume decrease
bind=NONE,XF86AudioMute,spawn,qs -c noctalia-shell ipc call volume muteOutput

bind=NONE,XF86MonBrightnessUp,spawn,qs -c noctalia-shell ipc call brightness increase
bind=NONE,XF86MonBrightnessDown,spawn,qs -c noctalia-shell ipc call brightness decrease

# bindl=NONE,XF86AudioPrev,spawn,qs -c noctalia-shell ipc call media previous
# bindl=NONE,XF86AudioPlay,spawn,qs -c noctalia-shell ipc call media playPause
# bindl=NONE,XF86AudioNext,spawn,qs -c noctalia-shell ipc call media next

bind=SUPER,Space,spawn,qs -c noctalia-shell ipc call launcher toggle
bind=SUPER,A,spawn,qs -c noctalia-shell ipc call launcher toggle
bind=SUPER,V,spawn,qs -c noctalia-shell ipc call launcher clipboard
bind=SUPER,E,spawn,qs -c noctalia-shell ipc call launcher emoji

bind=SUPER,C,spawn,qs -c noctalia-shell ipc call controlCenter toggle
# bind=SUPER,D,spawn,qs -c noctalia-shell ipc call dock toggle
bind=SUPER,N,spawn,qs -c noctalia-shell ipc call notifications toggleHistory
# bind=SUPER,Y,spawn,qs -c noctalia-shell ipc call wallpaper toggle
bind=SUPER,Comma,spawn,qs -c noctalia-shell ipc call settings toggle
bind=SUPER,Escape,spawn,qs -c noctalia-shell ipc call sessionMenu toggle

bind=SUPER,P,spawn,~/.config/mango/script/get_focus_info

# ---------------------
# Keymode
# ---------------------

# Enter 'resize' mode
bind=SUPER,R,setkeymode,resize

keymode=resize
bind=NONE,Up,smartresizewin,up
bind=NONE,Down,smartresizewin,down
bind=NONE,Left,smartresizewin,left
bind=NONE,Right,smartresizewin,right
bind=NONE,K,resizewin,+0,-20
bind=NONE,J,resizewin,+0,+20
bind=NONE,H,resizewin,-20,+0
bind=NONE,L,resizewin,+20,+0
bind=NONE,Escape,setkeymode,default
bind=NONE,Q,setkeymode,default

# ============================================
# Mouse Button Bindings
# ============================================
# btn_left and btn_right can't bind none mod key

# Window manipulation
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize
# mousebind=SUPER+CTRL,btn_right,killclient

# Overview mode (requires NONE modifier)
# mousebind=NONE,btn_left,toggleoverview,1
# mousebind=NONE,btn_right,killclient,0

# ============================================
# Axis Bindings
# ============================================
axisbind=SUPER,Up,viewtoleft_have_client
axisbind=SUPER,Down,viewtoright_have_client

axisbind=ALT,UP,focusdir,up
axisbind=ALT,DOWN,focusdir,down
axisbind=ALT+SHIFT,UP,focusdir,left
axisbind=ALT+SHIFT,DOWN,focusdir,right

# ============================================
# Gesture Bindings
# ============================================
# 3-finger: Window focus
gesturebind=NONE,left,3,viewtoright
gesturebind=NONE,right,3,viewtoleft
# gesturebind=NONE,Left,3,focusdir,right
# gesturebind=NONE,Right,3,focusdir,left
gesturebind=NONE,Up,3,focusdir,down
gesturebind=NONE,Down,3,focusdir,up
# gesturebind=NONE,Up,3,viewtoright
# gesturebind=NONE,Down,3,viewtoleft

# 4-finger: Workspace navigation
gesturebind=NONE,left,4,viewtoright_have_client
gesturebind=NONE,right,4,viewtoleft_have_client
gesturebind=NONE,Up,4,toggleoverview
gesturebind=NONE,Down,4,toggleoverview

