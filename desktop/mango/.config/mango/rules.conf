# ============================================
# Layer rule
# ============================================
# Rofi launcher
layerrule=animation_type_open:zoom,animation_type_close:zoom,layer_name:rofi

# Notification daemons - no animation, no shadow = snappy feel
layerrule=noanim:1,noshadow:1,layer_name:fyi
layerrule=noanim:1,noshadow:1,layer_name:swaync
layerrule=noanim:1,noshadow:1,layer_name:dunst
layerrule=noanim:1,noshadow:1,layer_name:mako

# Selection overlays - instant, no blur (slurp, color pickers)
layerrule=noblur:1,noanim:1,layer_name:selection

# ============================================
# Window Rule
# ============================================

# Screenshot & Annotation Tools
windowrule=noblur:1,isnoanimation:1,appid:slurp
windowrule=allow_csd:1,isnoanimation:1,isfloating:1,isoverlay:1,isnoanimation:1,appid:com.gabm.satty

# XDG portals (file chooser, screen share, etc.)
windowrule=isfloating:1,isoverlay:1,appid:xdg-desktop-portal
windowrule=isfloating:1,isoverlay:1,appid:xdg-desktop-portal-gtk
windowrule=isfloating:1,isoverlay:1,appid:xdg-desktop-portal-gnome

# Drag & Drop
windowrule=isfloating:1,isoverlay:1,isglobal:1,isopensilent:1,width:300,height:200,offsetx:98,offsety:-98,appid:it.catboy.ripdrag
windowrule=isfloating:1,isoverlay:1,isglobal:1,isopensilent:1,width:300,height:200,offsetx:98,offsety:-98,appid:dragon-drop

# GPG / SSH pinentry
windowrule=isfloating:1,isoverlay:1,appid:Pinentry-gtk
windowrule=isfloating:1,isoverlay:1,appid:pinentry
windowrule=isfloating:1,isoverlay:1,appid:pinentry-qt

# Polkit authentication agents
windowrule=isfloating:1,isoverlay:1,appid:polkit-gnome-authentication-agent-1
windowrule=isfloating:1,isoverlay:1,appid:org.gnome.PolicyKit1.AuthenticationAgent

# Generic file/save dialogs (by title)
windowrule=isfloating:1,isoverlay:1,title:Open File
windowrule=isfloating:1,isoverlay:1,title:Open Files
windowrule=isfloating:1,isoverlay:1,title:Select a File
windowrule=isfloating:1,isoverlay:1,title:Choose wallpaper
windowrule=isfloating:1,isoverlay:1,title:Open Folder
windowrule=isfloating:1,isoverlay:1,title:Save As
windowrule=isfloating:1,isoverlay:1,title:Save File
windowrule=isfloating:1,isoverlay:1,title:Library
windowrule=isfloating:1,isoverlay:1,title:Print

# Terminal Swallowing
windowrule=isterm:1,appid:foot
windowrule=isterm:1,appid:kitty
windowrule=isterm:1,appid:alacritty
windowrule=isterm:1,appid:wezterm
windowrule=isterm:1,appid:rio
windowrule=isterm:1,appid:ghostty

# Apps that should never swallow a terminal
windowrule=noswallow:1,appid:org.gnome.Nautilus
windowrule=noswallow:1,appid:thunar
windowrule=noswallow:1,appid:nemo
windowrule=noswallow:1,appid:files

# Firefox - allow CSD (it handles its own titlebar)
windowrule=allow_csd:1,appid:firefox
windowrule=allow_csd:1,appid:firefox-esr
windowrule=allow_csd:1,appid:librewolf
windowrule=allow_csd:1,appid:zen-browser

# Chromium-based
windowrule=allow_csd:1,appid:chromium
windowrule=allow_csd:1,appid:google-chrome
windowrule=allow_csd:1,appid:brave-browser
windowrule=allow_csd:1,appid:microsoft-edge

# PiP - always floating, global, overlay, bottom-right corner
windowrule=isfloating:1,isoverlay:1,isglobal:1,isopensilent:1,width:540,height:360,offsetx:98,offsety:-98,title:Picture in picture

# MPV - floating by default, sensible size
windowrule=isfloating:1,width:1280,height:720,appid:mpv

# VLC
windowrule=isfloating:1,appid:vlc

# GUI File manager
windowrule=isfloating:1,appid:org.gnome.Nautilus
windowrule=isfloating:1,appid:thunar
windowrule=isfloating:1,appid:nemo
windowrule=isfloating:1,appid:org.kde.dolphin
windowrule=isfloating:1,appid:pcmanfm
windowrule=isfloating:1,appid:files

# Zoom - floating, maximized
windowrule=isfloating:1,force_maximize:1,appid:zoom

# Discord - open on tag 9 silently
windowrule=isopensilent:1,tags:9,appid:discord
windowrule=isopensilent:1,tags:9,appid:vesktop
windowrule=isopensilent:1,tags:9,appid:WebCord

# Telegram
windowrule=isopensilent:1,tags:9,appid:org.telegram.desktop

# Signal
windowrule=isopensilent:1,tags:9,appid:signal-desktop

# JetBrains IDEs
# Note: force_maximize conflicts with isfloating on most tiling WMs.
# If you want IDEA tiled and maximized, drop isfloating.
# If you want it floating, use explicit width/height instead.
windowrule=force_maximize:1,appid:jetbrains-idea
windowrule=force_maximize:1,appid:jetbrains-pycharm

# JetBrains floating dialogs (settings, find, etc.) - matched by title
windowrule=isfloating:1,isoverlay:1,title:win0,appid:jetbrains-idea
windowrule=isfloating:1,isoverlay:1,title:win0,appid:jetbrains-pycharm

# VSCode / VSCodium
windowrule=force_maximize:1,appid:code
windowrule=force_maximize:1,appid:codium

# Note-taking & Research
windowrule=force_maximize:1,appid:obsidian
windowrule=force_maximize:1,appid:zotero
windowrule=force_maximize:1,appid:anki
windowrule=force_maximize:1,appid:logseq

# Productivity & Office
windowrule=force_maximize:1,appid:libreoffice-writer
windowrule=force_maximize:1,appid:libreoffice-calc
windowrule=force_maximize:1,appid:libreoffice-impress
windowrule=force_maximize:1,appid:libreoffice-draw

# LibreOffice floating dialogs (font picker, styles, etc.)
windowrule=isfloating:1,isoverlay:1,appid:libreoffice,title:Navigator
windowrule=isfloating:1,isoverlay:1,appid:libreoffice,title:Styles

# GUI image viewer
windowrule=isfloating:1,appid:imv
windowrule=isfloating:1,appid:swayimg

# GIMP - let it tile, it manages its own multi-window layout
windowrule=allow_csd:1,force_maximize:1,appid:gimp

# Inkscape
windowrule=force_maximize:1,appid:org.inkscape.Inkscape

# Pavucontrol (audio mixer) - small floating window
windowrule=isfloating:1,width:800,height:600,appid:pavucontrol
windowrule=isfloating:1,width:800,height:600,appid:org.pulseaudio.pavucontrol

# Bluetooth managers
windowrule=isfloating:1,width:600,height:500,appid:blueman-manager
windowrule=isfloating:1,width:600,height:500,appid:org.blueman.Manager

# Network managers
windowrule=isfloating:1,appid:nm-connection-editor

# Disk usage
windowrule=isfloating:1,appid:org.gnome.baobab
windowrule=isfloating:1,appid:qdirstat

# System monitors
windowrule=isfloating:1,force_maximize:1,appid:org.gnome.SystemMonitor
windowrule=isfloating:1,force_maximize:1,appid:io.missioncenter.MissionCenter

# Calculator
windowrule=isfloating:1,appid:org.gnome.Calculator
windowrule=isfloating:1,appid:qalculate-gtk

# Archive managers
windowrule=isfloating:1,appid:org.gnome.FileRoller
windowrule=isfloating:1,appid:ark

# Gaming - Steam
# Steam main window - let it tile
windowrule=force_maximize:1,appid:steam

# Steam floating dialogs (login, settings, update)
windowrule=isfloating:1,isoverlay:1,appid:steam,title:Steam
windowrule=isfloating:1,isoverlay:1,appid:steam,title:Steam Guard
windowrule=isfloating:1,isoverlay:1,appid:steam,title:Steam - Self Updater
windowrule=isfloating:1,isoverlay:1,appid:steam,title:Friends List

# Steam overlay inside games - don't mess with it
windowrule=noblur:1,isnoanimation:1,appid:steam_app_.*

# Native games / Proton - tearing for smooth gameplay
windowrule=force_tearing:1,isnoanimation:1,isnoborder:1,isnoshadow:1,isnoradius:1,title:steam_app_.*

# Gaming - Lutris
windowrule=isfloating:1,force_maximize:1,appid:lutris
windowrule=isfloating:1,isoverlay:1,appid:lutris,title:Lutris
windowrule=isfloating:1,isoverlay:1,title:Wine System Tray

# osu! needs tearing disabled and low latency decorations
windowrule=isfloating:1,isnoanimation:1,isnoborder:1,isnoshadow:1,isnoradius:1,allow_shortcuts_inhibit:1,appid:osu

# General emulator rules: no decorations, no animations, tearing on
windowrule=isfloating:1,isnoanimation:1,isnoborder:1,isnoshadow:1,isnoradius:1,force_tearing:1,appid:Ryujinx
windowrule=isfloating:1,isnoanimation:1,isnoborder:1,isnoshadow:1,isnoradius:1,force_tearing:1,appid:yuzu
windowrule=isfloating:1,isnoanimation:1,isnoborder:1,isnoshadow:1,isnoradius:1,force_tearing:1,appid:suyu
windowrule=isfloating:1,isnoanimation:1,isnoborder:1,isnoshadow:1,isnoradius:1,force_tearing:1,appid:rpcs3
windowrule=isfloating:1,isnoanimation:1,isnoborder:1,isnoshadow:1,isnoradius:1,force_tearing:1,appid:PPSSPP
windowrule=isfloating:1,isnoanimation:1,isnoborder:1,isnoshadow:1,isnoradius:1,force_tearing:1,appid:dolphin-emu
windowrule=isfloating:1,isnoanimation:1,isnoborder:1,isnoshadow:1,isnoradius:1,force_tearing:1,appid:pcsx2
windowrule=isfloating:1,isnoanimation:1,isnoborder:1,isnoshadow:1,isnoradius:1,force_tearing:1,appid:retroarch
